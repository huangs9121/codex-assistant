<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Codex Quota 推广封面对比</title>
  <style>
    :root {
      color-scheme: light;
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "PingFang SC", sans-serif;
      background: #d9dde3;
    }
    * { box-sizing: border-box; }
    body { margin: 0; padding: 64px; }
    .comparison { display: grid; gap: 54px; justify-content: center; }
    .candidate { margin: 0; }
    figcaption { margin: 0 0 12px; color: #3c4654; font-size: 18px; font-weight: 650; }
    .card {
      position: relative;
      width: 1280px;
      height: 640px;
      overflow: hidden;
      isolation: isolate;
    }
    .eyebrow { font-size: 18px; font-weight: 700; letter-spacing: .08em; }
    h1 { margin: 0; font-size: 72px; line-height: 1.08; letter-spacing: -.045em; }
    .lead { margin: 24px 0 0; font-size: 26px; line-height: 1.55; }
    .chips { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 32px; }
    .chip { padding: 9px 14px; border-radius: 999px; font-size: 16px; font-weight: 650; }
    .menu-ui {
      height: 100%; padding: 20px 20px 14px; color: #1d2428; background: linear-gradient(180deg, #edfaff, #f5f7f8);
      font-size: 19px; line-height: 1.48; text-align: left;
    }
    .menu-ui .info { font-weight: 520; }
    .menu-ui .info b { font-weight: 750; }
    .menu-ui .divider { height: 1px; margin: 13px 0; background: #cbd3d7; }
    .menu-ui .row { display: flex; align-items: center; min-height: 38px; }
    .menu-ui .row .arrow { margin-left: auto; font-size: 27px; line-height: 1; }
    .menu-ui .check { width: 25px; font-weight: 800; }
    .menu-ui .hint { color: #7b8388; font-size: 16px; }

    .a {
      color: #f8fbff;
      background: linear-gradient(135deg, #087fc0 0%, #0b69a6 48%, #064368 100%);
      padding: 62px 70px;
    }
    .a::after {
      content: "";
      position: absolute; inset: 0;
      background: radial-gradient(circle at 82% 12%, rgba(121, 228, 255, .44), transparent 30%);
      z-index: -1;
    }
    .a .copy { width: 720px; }
    .a .eyebrow { color: #bdeeff; }
    .a .lead { color: #d9f2ff; }
    .a .chip { color: #eaf9ff; background: rgba(255,255,255,.13); border: 1px solid rgba(255,255,255,.2); }
    .a .app-window {
      position: absolute; right: 54px; top: 42px; width: 410px; height: 556px;
      padding: 18px; border-radius: 30px;
      background: rgba(235, 250, 255, .92);
      box-shadow: 0 34px 80px rgba(0, 24, 42, .38), inset 0 0 0 1px rgba(255,255,255,.8);
      transform: rotate(1.8deg);
    }
    .a .window-top { display: flex; gap: 8px; padding: 1px 2px 15px; }
    .a .window-top i { width: 10px; height: 10px; border-radius: 50%; background: #7fb1c8; opacity: .5; }
    .a .menu-ui { height: 500px; border-radius: 18px; }

    .b {
      color: #111216;
      background: #f7f7f5;
      padding: 52px 64px;
      border: 1px solid #d4d4cf;
    }
    .b .rule { position: absolute; top: 0; left: 0; right: 0; height: 14px; background: #111216; }
    .b .copy { position: absolute; left: 64px; top: 68px; width: 670px; }
    .b .eyebrow { color: #5f626a; }
    .b h1 { margin-top: 26px; font-size: 68px; }
    .b h1 del { color: #92959c; text-decoration-thickness: 6px; text-decoration-color: #ff5b57; }
    .b .lead { width: 610px; color: #4c4f56; }
    .b .metrics {
      position: absolute; left: 64px; bottom: 52px; display: flex; gap: 42px;
      font-family: "SF Mono", ui-monospace, monospace;
    }
    .b .metric strong { display: block; font-size: 26px; }
    .b .metric span { display: block; margin-top: 3px; color: #73767e; font-size: 13px; }
    .b .shot-frame {
      position: absolute; right: 52px; top: 42px; width: 422px; height: 555px;
      overflow: hidden; background: #dff5ff; border: 2px solid #111216;
      box-shadow: 14px 14px 0 #ffce3a;
    }
    .b .menu-ui { width: 100%; height: 100%; padding-top: 26px; }

    .c {
      color: #173128;
      background: #e8f2ec;
      padding: 58px 64px;
    }
    .c::before {
      content: ""; position: absolute; inset: 0; z-index: -1; opacity: .36;
      background-image: linear-gradient(#9ab5a8 1px, transparent 1px), linear-gradient(90deg, #9ab5a8 1px, transparent 1px);
      background-size: 32px 32px;
    }
    .c .copy { width: 700px; }
    .c .eyebrow { color: #24634e; }
    .c h1 { margin-top: 24px; font-size: 66px; }
    .c .lead { width: 620px; color: #3d5b50; }
    .c .privacy {
      display: inline-flex; align-items: center; gap: 10px; margin-top: 34px;
      padding: 12px 16px; border: 1px solid #82a795; background: rgba(255,255,255,.58);
      font-size: 17px; font-weight: 700;
    }
    .c .privacy::before { content: "✓"; display: grid; place-items: center; width: 24px; height: 24px; border-radius: 50%; color: #fff; background: #247153; }
    .c .data-card {
      position: absolute; right: 50px; top: 42px; width: 432px; height: 556px;
      padding: 18px; border-radius: 12px; background: #f9fcfa;
      box-shadow: 0 22px 55px rgba(35, 72, 57, .22); border: 1px solid #9eb9ad;
    }
    .c .status-strip {
      display: flex; align-items: center; justify-content: space-between; height: 54px; padding: 0 16px;
      color: white; background: #257455; border-radius: 7px 7px 0 0;
      font-size: 20px; font-weight: 720;
    }
    .c .status-strip small { font-size: 14px; opacity: .82; }
    .c .menu-ui { width: 100%; height: 462px; border-radius: 0 0 7px 7px; font-size: 18px; }
    .c .note { position: absolute; left: 64px; bottom: 52px; color: #547064; font-family: "SF Mono", ui-monospace, monospace; font-size: 14px; }
  </style>
</head>
<body>
  <main class="comparison">
    <figure class="candidate">
      <figcaption>A · 菜单栏原生感｜最像一款成熟 macOS 工具</figcaption>
      <section class="card a">
        <div class="copy">
          <div class="eyebrow">CODEX QUOTA · 开源免费</div>
          <h1>别再反复输入<br>/status</h1>
          <p class="lead">剩余额度、重置倒计时和临时 reset 预告，始终待在 Mac 菜单栏。</p>
          <div class="chips"><span class="chip">15 秒自动更新</span><span class="chip">重置纠错</span><span class="chip">4 种样式</span></div>
        </div>
        <div class="app-window">
          <div class="window-top"><i></i><i></i><i></i></div>
          <div class="menu-ui" aria-label="Codex Quota 菜单预览">
            <div class="info">更新时间：18:42:15<br>下次重置：6 天 2 小时<br>当前套餐：<b>Pro</b><br>重置预告：暂无</div>
            <div class="divider"></div>
            <div class="row">展示形式 <span class="arrow">›</span></div>
            <div class="row">标识形式 <span class="arrow">›</span></div>
            <div class="divider"></div>
            <div class="row"><span class="check">✓</span>显示重置时间</div>
            <div class="row"><span class="check">✓</span>开机自动启动</div>
            <div class="divider"></div>
            <div class="row hint">按住 ⌘ 可自由拖动位置</div>
            <div class="row">检查更新…</div>
            <div class="row">退出</div>
          </div>
        </div>
      </section>
    </figure>

    <figure class="candidate">
      <figcaption>B · 痛点直给｜最适合 V2EX 和开发者社区</figcaption>
      <section class="card b">
        <div class="rule"></div>
        <div class="copy">
          <div class="eyebrow">A TINY MENU BAR FIX FOR CODEX USERS</div>
          <h1><del>/status</del><br>看一眼就够了。</h1>
          <p class="lead">自动更新真实 Codex 周额度，处理重置后的旧数据，并把 reset 预告送到通知中心。</p>
        </div>
        <div class="metrics">
          <div class="metric"><strong>15s</strong><span>自动刷新</span></div>
          <div class="metric"><strong>4</strong><span>展示形式</span></div>
          <div class="metric"><strong>0</strong><span>手动查询</span></div>
        </div>
        <div class="shot-frame">
          <div class="menu-ui" aria-label="Codex Quota 菜单预览">
            <div class="info">更新时间：18:42:15<br>下次重置：6 天 2 小时<br>当前套餐：<b>Pro</b><br>重置预告：暂无</div>
            <div class="divider"></div>
            <div class="row">展示形式 <span class="arrow">›</span></div>
            <div class="row">标识形式 <span class="arrow">›</span></div>
            <div class="divider"></div>
            <div class="row"><span class="check">✓</span>显示重置时间</div>
            <div class="row"><span class="check">✓</span>开机自动启动</div>
            <div class="divider"></div>
            <div class="row hint">按住 ⌘ 可自由拖动位置</div>
            <div class="row">检查更新…</div>
            <div class="row">退出</div>
          </div>
        </div>
      </section>
    </figure>

    <figure class="candidate">
      <figcaption>C · 本地可信｜最强调准确性和隐私</figcaption>
      <section class="card c">
        <div class="copy">
          <div class="eyebrow">本机只读 · 原生 SWIFT</div>
          <h1>额度读对，<br>比功能堆多更重要。</h1>
          <p class="lead">只看主 Codex 周额度池；重置到点主动纠正旧快照。数据留在你的 Mac。</p>
          <div class="privacy">不上传对话、账号或 Codex token</div>
        </div>
        <div class="data-card">
          <div class="status-strip"><span>Codex&nbsp; 87%</span><small>6天</small></div>
          <div class="menu-ui" aria-label="Codex Quota 菜单预览">
            <div class="info">更新时间：18:42:15<br>下次重置：6 天 2 小时<br>当前套餐：<b>Pro</b><br>重置预告：暂无</div>
            <div class="divider"></div>
            <div class="row">展示形式 <span class="arrow">›</span></div>
            <div class="row">标识形式 <span class="arrow">›</span></div>
            <div class="divider"></div>
            <div class="row"><span class="check">✓</span>显示重置时间</div>
            <div class="row"><span class="check">✓</span>开机自动启动</div>
            <div class="divider"></div>
            <div class="row hint">按住 ⌘ 可自由拖动位置</div>
            <div class="row">检查更新…</div>
            <div class="row">退出</div>
          </div>
        </div>
        <div class="note">OPEN SOURCE · APPLE SILICON · macOS 13+</div>
      </section>
    </figure>
  </main>
</body>
</html>
